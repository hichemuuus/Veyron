name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          name: Veyron ${{ steps.version.outputs.version }}
          tag_name: ${{ github.ref_name }}
          draft: true
          generate_release_notes: true

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: create-release
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri

      - name: Install system deps
        run: |
          python -m pip install --upgrade pip wheel setuptools

      - name: Install Python deps
        run: |
          python -m pip install -r backend/requirements.txt
          python -m pip install pyinstaller

      - name: Install npm deps
        run: npm ci
        working-directory: frontend

      - name: Verify environment
        run: python scripts/verify_environment.py

      - name: Build backend sidecar
        run: python scripts/build_backend.py

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Build Tauri app (NSIS installer)
        run: npm run tauri:build
        working-directory: frontend
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.UPDATER_PRIVATE_KEY }}
          TAURI_SIGNING_PASSPHRASE: ${{ secrets.UPDATER_PASSPHRASE }}

      - name: Sign installer + generate latest.json
        run: |
          python scripts/sign_update.py sign \
            frontend/src-tauri/target/release/bundle/nsis/Veyron_*.exe \
            --version ${{ needs.create-release.outputs.version }}
        env:
          UPDATER_PRIVATE_KEY: ${{ secrets.UPDATER_PRIVATE_KEY }}

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            frontend/src-tauri/target/release/bundle/nsis/Veyron_*.exe
            frontend/src-tauri/target/release/bundle/nsis/Veyron_*.msi
            frontend/src-tauri/target/release/bundle/nsis/latest.json
            frontend/src-tauri/target/release/bundle/nsis/*.sig
