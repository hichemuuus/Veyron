name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: windows-latest
    defaults:
      run:
        shell: powershell

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          $env:PYTHONPATH = "backend"
          pytest --tb=short -q

      - name: Type check frontend
        working-directory: frontend
        run: |
          npm ci
          npx tsc --noEmit
